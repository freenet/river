# Legacy Delegate Registry
#
# Single source of truth for all previous delegate versions.
# When the delegate WASM changes, add the OLD delegate's keys here
# so the migration system can transfer user data to the new delegate.
#
# Fields:
#   code_hash    = BLAKE3 hash of the raw delegate WASM bytes (hex)
#   delegate_key = BLAKE3(code_hash_bytes) — the delegate key (hex)
#
# To add a new entry:  cargo make add-migration
# To validate entries: cargo make check-migration
# To sync all WASMs:   cargo make sync-wasm


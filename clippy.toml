# Catch future `SystemTime::now()` slipping into wasm32 code. Discovered the
# hard way on #244: a literal `SystemTime::now()` in the DM-thread composer
# panicked at runtime because rustc's wasm time stub is `unreachable!()`.
# The fix is `crate::util::get_current_system_time()` (or `chrono::Utc::now()`
# for chrono types), which routes through a `Date.now()` wasm-bindgen shim on
# wasm32 and falls through to `SystemTime::now()` on native.
#
# This lint is advisory (clippy is not in CI per `.github/workflows/clippy.yml.disabled`),
# but `cargo clippy -p river-ui --target wasm32-unknown-unknown --no-default-features`
# locally will flag any new offender.
disallowed-methods = [
    { path = "std::time::SystemTime::now", reason = "use crate::util::get_current_system_time so it works under wasm32-unknown-unknown" },
]
